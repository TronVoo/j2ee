<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Pinky Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Định nghĩa bảng màu Pastel Pink */
        :root {
            --main-pink: #ff85a1;      /* Hồng nhấn */
            --light-pink: #fff5f7;     /* Nền hồng cực nhạt */
            --dark-pink: #f06292;      /* Hồng đậm cho text/icon */
            --soft-white: #ffffff;
        }

        body { 
            background-color: var(--light-pink); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Tùy chỉnh Navbar */
        .navbar {
            background-color: var(--soft-white) !important;
            box-shadow: 0 2px 10px rgba(255, 133, 161, 0.1);
            border-bottom: 2px solid var(--main-pink);
        }

        .navbar-brand { 
            font-weight: 800; 
            color: var(--main-pink) !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #555 !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--main-pink) !important;
        }

        /* Badge giỏ hàng */
        .badge-pink {
            background-color: var(--main-pink);
            color: white;
            border-radius: 50%;
            padding: 0.35em 0.65em;
        }

        /* Footer */
        footer {
            background-color: var(--soft-white);
            color: #888;
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* Container cho nội dung */
        .main-container {
            flex: 1;
            padding-top: 2rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">
            <i class="bi bi-box-seam-fill"></i> PINKY SHOP
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                style="border-color: var(--main-pink);">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item me-3">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="bi bi-grid"></i> Sản phẩm
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="bi bi-bag-heart"></i> Giỏ hàng
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill badge-pink" 
                              th:text="${cartCount != null ? cartCount : 0}">
                            0
                        </span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container main-container">
    <div layout:fragment="content"></div>
</div>

<footer class="text-center py-4 border-top">
    <div class="container">
        <p class="mb-0">&copy; 2026 <span style="color: var(--main-pink); font-weight: bold;">Lab05</span> - Hệ thống quản lý Shop Online ✨</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
