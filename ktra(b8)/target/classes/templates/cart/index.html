<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">

<div layout:fragment="content">
    <style>
        :root {
            --soft-pink: #fff5f7;
            --accent-pink: #ff85a1;
            --dark-pink: #f06292;
            --border-pink: #fce4ec;
        }

        body {
            background-color: var(--soft-pink) !important;
            color: #4a4a4a;
        }

        .cart-header {
            color: var(--dark-pink);
            font-weight: 700;
        }

        .btn-pink {
            background-color: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            transition: all 0.3s ease;
        }

        .btn-pink:hover {
            background-color: var(--dark-pink);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 133, 161, 0.3);
        }

        .btn-outline-pink {
            color: var(--dark-pink);
            border: 2px solid var(--dark-pink);
            border-radius: 20px;
        }

        .btn-outline-pink:hover {
            background-color: var(--dark-pink);
            color: white;
        }

        .table-container {
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border-pink);
        }

        .table thead {
            background-color: #fce4ec;
        }

        .card-summary {
            border: none;
            border-radius: 15px;
            background: #ffffff;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="cart-header"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>
        <a th:href="@{/products}" class="btn btn-outline-pink">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>

    <div class="alert shadow-sm border-0 bg-white text-center p-5" th:if="${cartItems.isEmpty()}" style="border-radius: 15px;">
        <i class="bi bi-bag-x text-muted" style="font-size: 3rem;"></i>
        <p class="mt-3 text-muted">Giỏ hàng đang trống. Hãy chọn thêm sản phẩm nhé!</p>
        <a th:href="@{/products}" class="btn btn-pink mt-2">Đi mua sắm ngay</a>
    </div>

    <div th:if="${!cartItems.isEmpty()}">
        <div class="table-responsive bg-white p-3 table-container shadow-sm mb-4">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="border-0">Sản phẩm</th>
                    <th class="border-0 text-center">Giá</th>
                    <th class="border-0 text-center" style="width: 200px;">Số lượng</th>
                    <th class="border-0 text-center">Tổng</th>
                    <th class="border-0 text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td>
                        <div class="fw-bold text-dark" th:text="${item.product.name}"></div>
                        <small class="badge bg-light text-muted fw-normal" 
                               th:text="${item.product.category != null ? item.product.category.name : 'N/A'}"></small>
                    </td>
                    <td class="text-center text-muted"
                        th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="d-flex justify-content-center gap-2">
                            <input type="hidden" name="productId" th:value="${item.product.id}">
                            <input type="number" min="1" name="quantity" th:value="${item.quantity}" 
                                   class="form-control form-control-sm text-center shadow-sm" style="width: 70px; border-radius: 10px;">
                            <button type="submit" class="btn btn-light btn-sm shadow-sm" style="border-radius: 10px;">
                                <i class="bi bi-arrow-repeat text-pink"></i>
                            </button>
                        </form>
                    </td>
                    <td class="text-center fw-bold" style="color: var(--dark-pink);"
                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="text-center">
                        <a class="text-danger" style="font-size: 1.2rem;"
                           th:href="@{/cart/remove/{id}(id=${item.product.id})}">
                            <i class="bi bi-trash3-fill"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-6 col-lg-4 offset-lg-8">
                <div class="card card-summary shadow-sm p-3">
                    <div class="card-body">
                        <h5 class="mb-4 fw-bold">Tóm tắt đơn hàng</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Tạm tính:</span>
                            <span class="fw-bold" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <hr class="border-pink">
                        <div class="d-flex justify-content-between mb-4">
                            <span class="h6 fw-bold">Thành tiền:</span>
                            <span class="h5 fw-bold" style="color: var(--dark-pink);"
                                  th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>

                        <form th:action="@{/cart/checkout}" method="post">
                            <button type="submit" class="btn btn-pink w-100 py-2 fw-bold text-uppercase">
                                <i class="bi bi-bag-check"></i> Đặt hàng ngay
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
