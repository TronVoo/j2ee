<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">

<div layout:fragment="content">
    <style>
        .breadcrumb-item a { color: var(--main-pink); text-decoration: none; }
        .card-edit { border-radius: 20px; border: none; overflow: hidden; }
        .pink-gradient-header { background: linear-gradient(45deg, #f06292, #ec407a); color: white; }
        
        .form-label { color: #555; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .form-control:focus, .form-select:focus {
            border-color: var(--main-pink);
            box-shadow: 0 0 0 0.25rem rgba(255, 133, 161, 0.25);
        }

        .current-img-container {
            position: relative;
            display: inline-block;
            padding: 10px;
            background: #fff5f7;
            border-radius: 15px;
            border: 2px solid #fce4ec;
        }

        .btn-update { 
            background-color: var(--main-pink); 
            color: white; 
            border-radius: 12px; 
            border: none; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .btn-update:hover { 
            background-color: var(--dark-pink); 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(255,133,161,0.4); 
            color: white;
        }
        .btn-back { border-radius: 12px; color: #888; background: #f8f9fa; }
    </style>

    <div class="row justify-content-center">
        <div class="col-md-10">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/products}"><i class="bi bi-grid-fill"></i> Sản phẩm</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Chỉnh sửa</li>
                </ol>
            </nav>

            <div class="card card-edit shadow-sm">
                <div class="card-header pink-gradient-header py-3">
                    <h5 class="mb-0 fw-bold text-center"><i class="bi bi-pencil-square me-2"></i>CẬP NHẬT THÔNG TIN</h5>
                </div>
                <div class="card-body p-5 bg-white">
                    <form th:action="@{/products/edit}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">
                        
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{image}"/>

                        <div class="row g-4">
                            <div class="col-md-7">
                                <div class="mb-4">
                                    <label class="form-label fw-bold"><i class="bi bi-info-circle me-1"></i> Tên sản phẩm</label>
                                    <input th:field="*{name}" class="form-control form-control-lg" 
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" style="border-radius: 12px;">
                                    <div class="invalid-feedback" th:errors="*{name}"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-bold"><i class="bi bi-currency-dollar me-1"></i> Giá bán</label>
                                        <div class="input-group">
                                            <input th:field="*{price}" type="number" class="form-control"
                                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" style="border-radius: 12px 0 0 12px;">
                                            <span class="input-group-text bg-light border-start-0" style="border-radius: 0 12px 12px 0;">đ</span>
                                            <div class="invalid-feedback" th:errors="*{price}"></div>
                                        </div>
                                    </div>

                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-bold"><i class="bi bi-bookmark-heart me-1"></i> Danh mục</label>
                                        <select th:field="*{category.id}" class="form-select"
                                                th:classappend="${#fields.hasErrors('category.id')} ? 'is-invalid'" style="border-radius: 12px;">
                                            <option th:each="c : ${categories}"
                                                    th:value="${c.id}"
                                                    th:text="${c.name}">
                                            </option>
                                        </select>
                                        <div class="invalid-feedback" th:errors="*{category.id}"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-5 border-start">
                                <div class="px-3 text-center">
                                    <label class="form-label fw-bold d-block text-start"><i class="bi bi-image me-1"></i> Hình ảnh hiện tại</label>
                                    
                                    <div class="current-img-container mb-3 shadow-sm">
                                        <img th:if="${product.image != null}"
                                             th:src="@{'/images/' + ${product.image}}"
                                             style="width: 150px; height: 150px; object-fit: cover; border-radius: 10px;"
                                             alt="Product Image">
                                        
                                        <div th:unless="${product.image != null}" 
                                             class="bg-white d-flex align-items-center justify-content-center" 
                                             style="width: 150px; height: 150px;">
                                            <i class="bi bi-image-fill text-pink" style="font-size: 3rem; opacity: 0.3;"></i>
                                        </div>
                                    </div>

                                    <div class="mt-2">
                                        <label class="form-label fw-bold text-start d-block small">Tải lên ảnh mới</label>
                                        <input type="file" name="imageProduct" class="form-control form-control-sm shadow-sm" style="border-radius: 8px;">
                                        <small class="text-muted d-block mt-2" style="font-size: 0.75rem;">Để trống nếu không muốn thay đổi</small>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4" style="border-color: #fce4ec;">
                        
                        <div class="d-flex justify-content-center gap-3">
                            <a th:href="@{/products}" class="btn btn-back px-4 py-2">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-update px-5 py-2">
                                <i class="bi bi-cloud-arrow-up-fill me-1"></i> LƯU THAY ĐỔI
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
